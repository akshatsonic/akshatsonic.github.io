        - generic [ref=e45]:
          - paragraph [ref=e46]:
            - text: I discovered the idea of code sometime in 2000 after unexpectedly getting a personal computer. Starting with Perl and VB6, I have been going down the rabbithole ever since. These days, I mostly write programs in Go. I released my first big FOSS project in 2002—bMachine, a blogging platform. Some of my personal projects can be
            - link "found here" [ref=e47] [cursor=pointer]:
              - /url: work
            - text: .
          - paragraph [ref=e48]: This website first went online in 2001 and has since undergone numerous iterations. It has lived on F2S, Angelfire, Geocities, Netfirms, and other free webhosts of the yesteryear, whose names I have long forgotten.
          - paragraph [ref=e49]: The period brings back intense bittersweet nostalgia—the discovery of code, the excitement of connecting to the world over dialup Internet, the gratification of relentless experimentation by trial and error. The heydey of guest books, web rings, CGI scripts, and Matt's FormMail. I loved every bit of it. I keep this website online as a reminder of that past.
          - paragraph [ref=e50]: I am fortunate to be in a position where what I do every day is exactly what I have unconditionally enjoyed doing for more than 26 years now—writing software, tinkering, and experimenting.
          - paragraph [ref=e51]:
            - emphasis [ref=e52]: Last updated on 7th April 2024.
            - text: I can be reached at
            - link "kailash@nadh.in" [ref=e53] [cursor=pointer]:
              - /url: mailto:kailash@nadh.in
            - text: .
