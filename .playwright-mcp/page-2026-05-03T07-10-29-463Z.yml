        - heading "Developer / Tinkerer / Absurdist" [level=2] [ref=e15]
        - img "Photo of Kailash Nadh" [ref=e17]
        - generic [ref=e18]:
          - paragraph [ref=e19]: I am a hobbyist software developer and a tinkerer.
          - paragraph [ref=e20]: For a brief period, I was in the academia—at the Middlesex University, London—doing research, from where I obtained a BSc. in Computer Science (2008) and a PhD in Artificial Intelligence & Computational Linguistics (2011).
          - paragraph [ref=e21]:
            - text: In 2013, I started the tech team at
            - link "Zerodha" [ref=e22] [cursor=pointer]:
              - /url: https://zerodha.com
            - text: ", now India's largest stock broker, where I have been the CTO ever since. At Zerodha, we have an"
            - link "unconventional team" [ref=e23] [cursor=pointer]:
              - /url: https://zerodha.tech/blog/hello-world/
            - text: and we work on interesting financial technology projects.
          - paragraph [ref=e24]: "I volunteer at several non-profit organisations, including the following ones that I co-founded:"
          - list [ref=e25]:
            - listitem [ref=e26]:
              - link "FOSS United Foundation" [ref=e27] [cursor=pointer]:
                - /url: https://fossunited.org
              - text: — started in 2020 to promote Free and Open Source Software communities and activities in India.
            - listitem [ref=e28]:
              - link "Rainmatter Foundation" [ref=e29] [cursor=pointer]:
                - /url: https://rainmatter.org
              - text: — started in 2020 to back initiatives and projects in India focusing on ecological preservation and climate change.
            - listitem [ref=e30]:
              - link "Indic Digital Archive Foundation" [ref=e31] [cursor=pointer]:
                - /url: https://indicarchive.org
              - text: — started in 2022. Works on Indic language computing projects and digital preservation of Indic language cultural artefacts such as books, publications, and documents.
            - listitem [ref=e32]:
              - link "Samagata Foundation" [ref=e33] [cursor=pointer]:
                - /url: https://samagata.org
              - text: — setup in 2023 with the aim of backing initiatives and projects that cut across science, culture, art, technology, and education with a specific focus on the creation of public commons, institutions, and community spaces.
          - paragraph
          - paragraph [ref=e34]: I identify strongly as an absurdist, a worldview that drives everything I do. I have a bleak view of the future thanks to human-made climate change, humanity's callous penchant for relentless extraction, environmental and ecological destruction, and its irrational hatred for fellow beings. And yet, somehow, I am not a dysfunctional pessimist.
